# Sync Tools Project from commits - Daily
#
# Deletes all items, re-adds as real issues, assigns by commit date.
# Iteration 1: Feb 15-28, Iteration 2: Mar 1-14, etc.
#
# Requires: PROJECT_PAT secret with BOTH project AND repo scopes

name: Sync Project from Commits

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Sync project
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: bash scripts/sync-project-from-commits.sh
